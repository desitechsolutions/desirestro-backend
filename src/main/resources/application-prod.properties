# ───────────────────────────────────────────────
# Production Profile (spring.profiles.active=prod)
# All sensitive values come from environment variables.
# ───────────────────────────────────────────────

# MySQL — from environment
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA — no SQL logging in prod
spring.jpa.show-sql=false

# JWT — from environment
jwt.secret=${JWT_SECRET}

# CORS — from environment
app.allowed-origins=${APP_ALLOWED_ORIGINS}

# Logging — production levels
logging.level.com.dts.restro=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# Actuator — restrict sensitive endpoints in prod
management.endpoint.health.show-details=never

# Swagger UI disabled in production (enable behind VPN if needed)
springdoc.swagger-ui.enabled=false
