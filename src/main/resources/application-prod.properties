
# MySQL from environment
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA no SQL logging in prod
spring.jpa.show-sql=false

# JWT from environment
jwt.secret=${JWT_SECRET}

# CORS from environment
app.allowed-origins=${APP_ALLOWED_ORIGINS}

# Logging production levels
logging.level.com.dts.restro=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# Actuator restrict sensitive endpoints in prod
management.endpoint.health.show-details=never

# Swagger UI disabled in production (enable behind VPN if needed)
springdoc.swagger-ui.enabled=false

# Password Reset
app.reset-token-expiration-minutes=${RESET_TOKEN_EXPIRATION_MINUTES:30}
app.frontend-url=${FRONTEND_URL:https://app.desirestro.com}

# Mail (SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
