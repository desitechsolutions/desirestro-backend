jwt.secret=+O+lT01PYSxnXOMeI0qfYNyOR/eS4VWSlTNTLADH6DIWxBR5QCuuw0aMaNAMfaw8/Q7k5bBFjR9IFAca4Bth4Q==
jwt.expiration=86400000

logging.level.com.dts.restro=INFO
logging.level.org.springframework.security=WARN
